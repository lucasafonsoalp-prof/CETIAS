<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI - Gestão Disciplinar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- Top Navigation -->
    <header class="bg-blue-800 text-white shadow" style="background-color: #0d47a1;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <h1 class="text-2xl font-bold tracking-tight">SGI <span class="font-normal text-blue-200">| Gestão Disciplinar</span></h1>
            </div>
            <div class="text-sm font-medium text-blue-200 border border-blue-600 rounded-full py-1.5 px-4 bg-blue-900/30">
                Portal do Coordenador / Professor
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Formulário de Registro -->
        <section class="lg:col-span-4 fade-in">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3">
                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Registrar Ocorrência
                </h2>
                
                <form id="infractionForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nome do Aluno *</label>
                        <input type="text" id="studentName" required class="w-full rounded-md border-slate-300 border px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder-slate-400" placeholder="Ex: João da Silva">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Turma / Ano *</label>
                            <input type="text" id="classYear" required class="w-full rounded-md border-slate-300 border px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder-slate-400" placeholder="Ex: 8º Ano A">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Data/Hora *</label>
                            <input type="datetime-local" id="dateTime" required class="w-full rounded-md border-slate-300 border px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-slate-700">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Gravidade *</label>
                            <select id="severity" required class="w-full rounded-md border-slate-300 border px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all bg-white text-slate-700">
                                <option value="" disabled selected>Selecione...</option>
                                <option value="Leve">🟢 Leve</option>
                                <option value="Média">🟡 Média</option>
                                <option value="Grave">🔴 Grave</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de Infração *</label>
                            <select id="infractionType" required class="w-full rounded-md border-slate-300 border px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all bg-white text-slate-700">
                                <option value="" disabled selected>Selecione...</option>
                                <option value="Atraso">Atraso</option>
                                <option value="Uso de celular">Uso de celular</option>
                                <option value="Desrespeito às regras">Desrespeito às regras</option>
                                <option value="Uniforme incompleto">Uniforme incompleto</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Descrição do Ocorrido</label>
                        <textarea id="description" rows="3" class="w-full rounded-md border-slate-300 border px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all resize-none placeholder-slate-400" placeholder="Detalhe brevemente o que aconteceu..."></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Ação Tomada</label>
                        <select id="actionTaken" class="w-full rounded-md border-slate-300 border px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all bg-white text-slate-700">
                            <option value="" disabled selected>Selecione (opcional)</option>
                            <option value="Advertência verbal">Advertência verbal</option>
                            <option value="Comunicação aos pais">Comunicação aos pais</option>
                            <option value="Encaminhamento à direção">Encaminhamento à direção</option>
                            <option value="Suspensão">Suspensão</option>
                            <option value="Nenhuma">Nenhuma</option>
                        </select>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full flex justify-center items-center gap-2 bg-blue-700 hover:bg-blue-800 text-white font-medium py-3 px-4 rounded-md transition-colors shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-blue-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                            Salvar Registro
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Histórico e Tabela -->
        <section class="lg:col-span-8 fade-in" style="animation-delay: 0.1s; animation-fill-mode: both;">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
                
                <div class="p-5 border-b border-slate-200 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <h2 class="text-xl font-semibold flex items-center gap-2 text-slate-800">
                        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Histórico de Ocorrências
                    </h2>
                    
                    <button id="exportBtn" class="flex justify-center items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium py-2 px-4 rounded-md transition-colors shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-emerald-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Exportar (.csv)
                    </button>
                </div>
                
                <div class="p-4 border-b border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-3 bg-white">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchName" class="block w-full pl-9 pr-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="Buscar aluno...">
                    </div>
                    <div>
                        <select id="filterClass" class="block w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500 outline-none bg-white transition-colors">
                            <option value="">Todas as Turmas/Anos</option>
                        </select>
                    </div>
                    <div>
                        <select id="filterSeverity" class="block w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500 outline-none bg-white transition-colors">
                            <option value="">Todos os Níveis</option>
                            <option value="Leve">Apenas Leve</option>
                            <option value="Média">Apenas Média</option>
                            <option value="Grave">Apenas Grave</option>
                        </select>
                    </div>
                </div>

                <div class="flex-1 overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Data / Hora</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Aluno / Turma</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Infração</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Ação Tomada</th>
                            </tr>
                        </thead>
                        <tbody id="infractionsTableBody" class="bg-white text-sm divide-y divide-slate-100">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                    
                    <!-- Estado Vazio -->
                    <div id="emptyState" class="hidden flex flex-col items-center justify-center p-12 text-slate-500">
                        <svg class="w-16 h-16 mb-4 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <p class="text-base font-medium text-slate-600">Nenhum registro encontrado</p>
                        <p class="text-sm mt-1 text-center">Nenhuma infração corresponde aos filtros de busca ou nada foi cadastrado ainda.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
